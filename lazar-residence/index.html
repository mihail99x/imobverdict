<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit: Lazăr Residence | ImobVerdict</title>
    <meta name="description" content="Analiză independentă Lazăr Residence Iași: impactul regimului hotelier, probleme de izolare fonică și managementul viciilor de construcție.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --mint: #7ef9d4; --mint-dim: rgba(126,249,212,0.12); --mint-border: rgba(126,249,212,0.2);
            --purple-deep: #1a0f2e; --text-primary: #f0eef8; --text-secondary: rgba(240,238,248,0.75);
            --text-muted: rgba(240,238,248,0.52); --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(126,249,212,0.12); --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px;
        }
        html { scroll-behavior: smooth; }
        body { 
            background-color: var(--purple-deep); 
            background-image: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(90,50,150,0.42) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 80%, rgba(30,80,100,0.3) 0%, transparent 55%);
            color: var(--text-primary); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.6; min-height: 100vh; 
        }
        body::before { content: ''; position: fixed; inset: 0; background: linear-gradient(160deg, rgba(18,8,35,0.93) 0%, rgba(22,12,40,0.9) 50%, rgba(14,30,42,0.93) 100%); z-index: -1; }
        
        /* NAVBAR FIX: Aliniere flexibilă pe un singur rând */
        .navbar { 
            position: sticky; 
            top: 0; 
            z-index: 200; 
            background: rgba(18,8,35,0.85); 
            backdrop-filter: blur(18px); 
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--mint-border); 
            padding: 0 24px; 
            height: 52px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        .navbar-left { 
            display: flex; 
            align-items: center; 
        }
        .logo { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--text-primary); text-decoration: none; display: inline-block; }
        .logo span { color: var(--mint); }
        .back-link { display: inline-flex; align-items: center; gap: 7px; font-size: 0.78rem; font-weight: 500; color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
        .back-link:hover { color: var(--mint); }
        
        .wrapper { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }
        .report-header { background: var(--card-bg); border: 1px solid var(--mint-border); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 40px; position: relative; }
        .report-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 0%, var(--mint) 40%, rgba(126,249,212,0.28) 100%); }
        .project-name { font-family: 'DM Serif Display', serif; font-size: clamp(1.8rem, 4vw, 2.8rem); line-height: 1.1; color: var(--text-primary); }
        .risk-badge { display: inline-flex; align-items: center; gap: 7px; padding: 7px 16px; border-radius: 100px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; white-space: nowrap; }
        .risk-badge.high { background: rgba(255,107,107,0.15); color: #ff9a9a; border: 1px solid rgba(255,107,107,0.32); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 25px; }
        .stat-item { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius-sm); padding: 14px 16px; }
        .stat-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 0.92rem; color: var(--mint); font-weight: 500; }

        .report-body { background: var(--card-bg); border: 1px solid rgba(126,249,212,0.1); border-top: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); padding: 40px; }
        .section-title { display: flex; align-items: center; gap: 12px; font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: var(--text-primary); margin: 44px 0 20px; }
        .section-title::before { content: ''; width: 3px; height: 20px; background: var(--mint); border-radius: 2px; }

        .risk-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .risk-table th { padding: 10px 16px; text-align: left; font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--mint-border); }
        .risk-table td { padding: 14px 16px; color: var(--text-secondary); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .impact-tag { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 4px; font-size: 0.67rem; font-weight: 600; text-transform: uppercase; }
        .impact-tag.critic { background: rgba(255,107,107,0.14); color: #ff9a9a; }
        .impact-tag.major { background: rgba(255,160,80,0.14); color: #ffba84; }
        .impact-tag.optim { background: rgba(110,231,183,0.13); color: #87f0c8; }

        .obs-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
        .obs-list li { display: flex; gap: 14px; padding: 16px 18px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius-sm); font-size: 0.875rem; line-height: 1.6; }
        .obs-list li.pos::before { content: '🟢'; }
        .obs-list li.neg::before { content: '🔴'; }

        .verdict-box { background: rgba(126,249,212,0.05); border-left: 3px solid var(--mint); padding: 24px 28px; margin-top: 44px; border-radius: 0 10px 10px 0; border-top: 1px solid var(--mint-border); border-right: 1px solid var(--mint-border); border-bottom: 1px solid var(--mint-border); }
        .verdict-label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; color: var(--mint); display: block; margin-bottom: 10px; }
        
        .fade-in { opacity: 0; transform: translateY(14px); animation: fadeUp 0.5s ease forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 640px) { 
            .report-header, .report-body { padding: 24px 20px; } 
            .navbar .nav-label, .navbar .nav-divider-line { display: none !important; }
        }
    </style>
</head>
